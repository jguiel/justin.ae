<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@jg.phtg</title>
    <link rel="stylesheet" href="style.css">
    <script src="photo-loader.js"></script>
    <script>
        function loadTemplate() {
            fetch('template.html')
                .then(response => response.text())
                .then(data => {
                    document.body.innerHTML = data;
                    const mainContent = document.getElementById('main-content');
                    mainContent.innerHTML = `
                        <h1 class="title">35mm Photography<span class="cursor">█</span></h1>
                        <p class="summary">@jg.phtg on instagram.<br>Select film photographs by way of Canon AE-1, Canon EOS, Canon 7, Canon P, Yashica T4, and various point & shoot cameras. I like to buy busted film cameras at estate sales and repair them.</p>
                        <div class="photo-grid"></div>
                        <div class="links">
                            <a href="https://www.instagram.com/jg.phtg" target="_blank">Insta</a>
                            <a href="https://www.linkedin.com/in/justinguiel" target="_blank">LinkedIn</a>
                            <a href="https://github.com/jguiel" target="_blank">GitHub</a>
                        </div>
                    `;
                    loadPhotoGrid('film_phtg');
                })
                .catch(error => console.error('Error loading template:', error));
        }

        window.onload = loadTemplate;
    </script>
</head>
<body>
</body>
</html>
